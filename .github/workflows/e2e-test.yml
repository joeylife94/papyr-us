name: E2E Tests (On-Demand)

on:
  push:
    branches:
      - main
      - develop
      - 'day/**'
  schedule:
    # Runs daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch: {}

env:
  NODE_VERSION: '20'
  DATABASE_URL: postgresql://papyrus_user:papyrus_password_2024@localhost:5432/papyrus_db

jobs:
  e2e:
    name: 'E2E · Playwright'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: papyrus_user
          POSTGRES_PASSWORD: papyrus_password_2024
          POSTGRES_DB: papyrus_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U papyrus_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run schema migrations
        run: npx drizzle-kit push --config drizzle.config.ts
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run E2E tests
        id: e2e
        run: npm run test:e2e
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Notify webhook on failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.E2E_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "content": "❌ **E2E tests failed**\n**Repo:** ${{ github.repository }}\n**Branch:** `${{ github.ref_name }}`\n**Commit:** `${{ github.sha }}`\n**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'
